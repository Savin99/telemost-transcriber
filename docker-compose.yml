services:
  bot:
    build: ./bot-service
    ports:
      - "8000:8000"
    shm_size: "512m"
    environment:
      TRANSCRIBER_URL: http://transcriber:8001
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-pass}@postgres:5432/${POSTGRES_DB:-telemost_bot}
      BOT_NAME: ${BOT_NAME:-Транскрибатор}
      TELEMOST_SERVICE_API_KEY: ${TELEMOST_SERVICE_API_KEY}
      GDRIVE_FOLDER_ID: ${GDRIVE_FOLDER_ID:-}
      GDRIVE_CLIENT_SECRET: ${GDRIVE_CLIENT_SECRET:-/app/credentials/client_secret.json}
      GDRIVE_TOKEN_PATH: ${GDRIVE_TOKEN_PATH:-/app/credentials/gdrive_token.json}
      MEETING_METADATA_LLM_ENABLED: ${MEETING_METADATA_LLM_ENABLED:-false}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MEETING_METADATA_RULES_JSON: ${MEETING_METADATA_RULES_JSON:-}
      MEETING_METADATA_RULES_PATH: ${MEETING_METADATA_RULES_PATH:-}
      MEETING_METADATA_EXECUTOR_MODEL: ${MEETING_METADATA_EXECUTOR_MODEL:-claude-sonnet-4-6}
      MEETING_METADATA_ADVISOR_MODEL: ${MEETING_METADATA_ADVISOR_MODEL:-claude-opus-4-6}
      MEETING_METADATA_ADVISOR_ENABLED: ${MEETING_METADATA_ADVISOR_ENABLED:-true}
      MEETING_METADATA_ADVISOR_MAX_USES: ${MEETING_METADATA_ADVISOR_MAX_USES:-2}
      MEETING_METADATA_TIMEOUT_SEC: ${MEETING_METADATA_TIMEOUT_SEC:-120}
      MEETING_METADATA_MAX_TOKENS: ${MEETING_METADATA_MAX_TOKENS:-1024}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
      AUDIO_RETENTION_DAYS: ${AUDIO_RETENTION_DAYS:-30}
      MAX_CONCURRENT_JOBS: ${MAX_CONCURRENT_JOBS:-4}
      AUDIO_CLEANUP_INTERVAL_SEC: ${AUDIO_CLEANUP_INTERVAL_SEC:-3600}
    volumes:
      - recordings:/app/recordings
    depends_on:
      postgres:
        condition: service_healthy
      transcriber:
        condition: service_started

  transcriber:
    build: ./transcriber-service
    ports:
      - "8001:8001"
    environment:
      HF_TOKEN: ${HF_TOKEN}
      DIARIZATION_MODEL: ${DIARIZATION_MODEL:-pyannote/speaker-diarization-community-1}
      CLUSTERING_THRESHOLD: ${CLUSTERING_THRESHOLD:-0.35}
      CLUSTERING_FA: ${CLUSTERING_FA:-0.04}
      CLUSTERING_FB: ${CLUSTERING_FB:-0.9}
      VOICE_BANK_DIR: ${VOICE_BANK_DIR:-/app/voice_bank}
      VOICE_MATCH_THRESHOLD: ${VOICE_MATCH_THRESHOLD:-0.40}
      MIN_EMBEDDING_SEGMENT_SEC: ${MIN_EMBEDDING_SEGMENT_SEC:-1.0}
    volumes:
      - recordings:/app/recordings
      - models:/root/.cache
      - voice_bank:/app/voice_bank
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}
      POSTGRES_DB: ${POSTGRES_DB:-telemost_bot}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  recordings:
  models:
  voice_bank:
  pgdata:
