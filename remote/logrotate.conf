# Ротация логов telemost-transcriber на Vast.ai хосте.
# Запускается через cron: bash rotate_logs.sh (см. bootstrap_vast_host.sh).
# Состояние хранится в /workspace/.logrotate.state чтобы пережить рестарт контейнера.

/workspace/logs/*.log {
    hourly
    rotate 7
    maxsize 50M
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    dateext
    dateformat -%Y%m%d-%H%M%S
}
